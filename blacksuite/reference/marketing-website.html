<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBMD — Marketing Website UI Kit</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body { background: #080808; color: #CDCCCA; font-family: 'Satoshi', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── TOKENS ── */
const G = {
  gold: '#B8962E', goldLight: '#D4AF5A', goldDark: '#8C6D1F',
  black: '#080808', charcoal: '#111111', dark: '#1C1C1C',
  silver: '#999999', mid: '#555555', offWhite: '#F7F4EE', text: '#CDCCCA',
  border: 'rgba(184,150,46,0.15)',
};

/* ── NAV ── */
function Nav({ screen, nav }) {
  const links = ['home','services','work','contact'];
  return (
    <header style={{ position:'sticky',top:0,zIndex:100,background:'rgba(8,8,8,0.96)',backdropFilter:'blur(16px)',borderBottom:`1px solid ${G.border}` }}>
      <div style={{ maxWidth:1160,margin:'0 auto',padding:'0 40px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between' }}>
        <a onClick={()=>nav('home')} style={{ display:'flex',alignItems:'center',gap:12,cursor:'pointer',textDecoration:'none' }}>
          <img src="../../assets/logo-monogram.png" style={{ height:32,width:'auto' }} alt="LBM" />
          <span style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:G.offWhite,lineHeight:1.5 }}>Lucky Black<br/>Media &amp; Design</span>
        </a>
        <nav style={{ display:'flex',gap:28,alignItems:'center' }}>
          {links.map(l => (
            <button key={l} onClick={()=>nav(l)} style={{ background:'none',border:'none',cursor:'pointer',fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:screen===l?G.gold:G.silver,borderBottom:screen===l?`1px solid ${G.gold}`:'1px solid transparent',paddingBottom:2,transition:'color 180ms' }}>
              {l}
            </button>
          ))}
          <button onClick={()=>nav('contact')} style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.black,background:G.gold,border:`1px solid ${G.gold}`,padding:'9px 18px',cursor:'pointer',transition:'background 180ms' }}
            onMouseEnter={e=>e.currentTarget.style.background=G.goldLight}
            onMouseLeave={e=>e.currentTarget.style.background=G.gold}>
            Book Now
          </button>
        </nav>
      </div>
    </header>
  );
}

/* ── HERO ── */
function Hero({ nav }) {
  return (
    <section style={{ background:G.black,minHeight:'calc(100vh - 64px)',display:'flex',alignItems:'center',padding:'80px 40px',position:'relative',overflow:'hidden' }}>
      {/* hero bg overlay */}
      <div style={{ position:'absolute',inset:0,backgroundImage:"url('https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=1600&q=80&auto=format&fit=crop')",backgroundSize:'cover',backgroundPosition:'center',opacity:0.12 }}/>
      <div style={{ position:'absolute',inset:0,background:'linear-gradient(to right, rgba(8,8,8,0.95) 50%, rgba(8,8,8,0.5))' }}/>
      <div style={{ position:'relative',maxWidth:1160,margin:'0 auto',width:'100%',display:'grid',gridTemplateColumns:'1fr 1fr',gap:64,alignItems:'center' }}>
        <div>
          <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,letterSpacing:'0.45em',textTransform:'uppercase',color:G.gold,marginBottom:24 }}>Strategic Visual Systems</div>
          <h1 style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(40px,5vw,72px)',fontWeight:700,color:G.offWhite,lineHeight:1.0,letterSpacing:'0.02em',marginBottom:24 }}>
            Your brand should<br/>command the room<br/><em style={{ color:G.gold,fontStyle:'italic' }}>before you speak.</em>
          </h1>
          <div style={{ width:60,height:1,background:G.gold,marginBottom:24 }}/>
          <p style={{ fontFamily:"'Satoshi',sans-serif",fontSize:15,fontWeight:300,lineHeight:1.82,color:G.silver,maxWidth:480,marginBottom:36 }}>
            Lucky Black Media &amp; Design builds luxury visual identities, social systems, and campaign assets that position your business as the undeniable premium option.
          </p>
          <div style={{ display:'flex',gap:14,flexWrap:'wrap',alignItems:'center',marginBottom:48 }}>
            <button onClick={()=>nav('services')} style={{ fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.black,background:G.gold,border:`1px solid ${G.gold}`,padding:'13px 28px',cursor:'pointer' }}>View Services</button>
            <button onClick={()=>nav('contact')} style={{ fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.gold,background:'transparent',border:`1px solid ${G.gold}`,padding:'13px 28px',cursor:'pointer' }}>Book a Consultation</button>
          </div>
          {/* stat strip */}
          <div style={{ display:'flex',gap:32,paddingTop:24,borderTop:`1px solid ${G.border}` }}>
            {[['12+','Years in Business'],['Est.','2013'],['4','Core Services'],['∞','Brand Potential']].map(([n,l])=>(
              <div key={l}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:G.gold,lineHeight:1 }}>{n}</div>
                <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.silver,marginTop:4 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Right — badge seal */}
        <div style={{ display:'flex',alignItems:'center',justifyContent:'center' }}>
          <img src="../../assets/logo-badge.png" style={{ width:'min(340px,80%)',height:'auto',opacity:0.85 }} alt="LBMD Heritage Seal" />
        </div>
      </div>
    </section>
  );
}

/* ── SERVICE CARD ── */
function ServiceCard({ num, label, title, desc, icon }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:G.charcoal,border:`1px solid ${hov?G.border:'rgba(184,150,46,0.04)'}`,padding:'28px 24px',display:'flex',flexDirection:'column',gap:12,cursor:'default',transition:'border-color 180ms,transform 180ms',transform:hov?'translateY(-2px)':'none',position:'relative',overflow:'hidden' }}>
      {/* watermark number */}
      <div style={{ position:'absolute',top:-8,right:4,fontFamily:"'Cormorant Garamond',serif",fontSize:72,fontWeight:700,color:hov?'#1A1A1A':'#141414',lineHeight:1,userSelect:'none',transition:'color 180ms' }}>{num}</div>
      {/* gold art block */}
      <div style={{ background:'rgba(184,150,46,0.06)',width:56,height:56,display:'flex',alignItems:'center',justifyContent:'center' }}>
        {icon}
      </div>
      <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:G.gold }}>{label}</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:G.offWhite,lineHeight:1.15 }}>{title}</div>
      <div style={{ height:1,background:G.gold,opacity:0.4 }}/>
      <p style={{ fontFamily:"'Satoshi',sans-serif",fontSize:12,fontWeight:300,lineHeight:1.75,color:G.silver }}>{desc}</p>
      <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.gold,display:'flex',alignItems:'center',gap:6,marginTop:'auto' }}>
        Learn More <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6H10M7 3L10 6L7 9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
    </div>
  );
}

const SERVICES = [
  { num:'01',label:'Brand Strategy & Identity',title:'Visual Identity Systems',desc:'Complete visual identities built to command top-tier rates. Luxury logos, brand guidelines, and strategic typography.',
    icon:<svg width="28" height="28" viewBox="0 0 52 52" fill="none"><rect x="6" y="6" width="40" height="40" stroke="#B8962E" strokeWidth="1.2"/><rect x="14" y="14" width="24" height="24" stroke="#B8962E" strokeWidth="0.6"/><text x="26" y="32" textAnchor="middle" fill="#B8962E" fontSize="14" fontWeight="700" fontFamily="serif">B</text></svg> },
  { num:'02',label:'Social Media Design',title:'Social Facelift',desc:'Cohesive grid layouts, custom highlight covers, and branded templates that transform your feed into a 24/7 premium asset.',
    icon:<svg width="28" height="28" viewBox="0 0 52 52" fill="none"><rect x="10" y="8" width="32" height="36" rx="3" stroke="#B8962E" strokeWidth="1.2"/><rect x="16" y="15" width="20" height="12" stroke="#B8962E" strokeWidth="0.6"/><line x1="16" y1="32" x2="36" y2="32" stroke="#B8962E" strokeWidth="0.9"/></svg> },
  { num:'03',label:'High-End Print & Events',title:'Print & Publication',desc:'Luxury event flyers, corporate one-sheets, and stationery designed to command attention and reinforce premium positioning.',
    icon:<svg width="28" height="28" viewBox="0 0 52 52" fill="none"><rect x="8" y="14" width="30" height="22" stroke="#B8962E" strokeWidth="1.2"/><rect x="14" y="20" width="18" height="10" stroke="#B8962E" strokeWidth="0.6"/><line x1="38" y1="18" x2="44" y2="14" stroke="#B8962E" strokeWidth="0.9"/></svg> },
  { num:'04',label:'Digital Campaigns',title:'Campaign Design',desc:'Custom QR setups, monthly email bundles, and high-conversion promotional graphics engineered for measurable results.',
    icon:<svg width="28" height="28" viewBox="0 0 52 52" fill="none"><circle cx="26" cy="26" r="16" stroke="#B8962E" strokeWidth="1.2"/><circle cx="26" cy="26" r="8" stroke="#B8962E" strokeWidth="0.6"/><line x1="26" y1="10" x2="26" y2="14" stroke="#B8962E" strokeWidth="1.2"/><line x1="26" y1="38" x2="26" y2="42" stroke="#B8962E" strokeWidth="1.2"/></svg> },
];

/* ── CONTACT ── */
function Contact() {
  const [sent, setSent] = React.useState(false);
  const inputStyle = { fontFamily:"'Satoshi',sans-serif",fontSize:13,background:G.charcoal,border:`1px solid ${G.border}`,color:G.offWhite,padding:'12px 14px',outline:'none',width:'100%',transition:'border-color 180ms' };
  return (
    <section style={{ padding:'80px 40px',background:G.black,maxWidth:1160,margin:'0 auto' }}>
      <div style={{ maxWidth:520 }}>
        <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.45em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>Get In Touch</div>
        <h2 style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(32px,4vw,52px)',fontWeight:700,color:G.offWhite,lineHeight:1.0,marginBottom:12 }}>Let's build<br/><em style={{ color:G.gold }}>something.</em></h2>
        <div style={{ width:60,height:1,background:G.gold,marginBottom:32 }}/>
        {sent ? (
          <div style={{ border:`1px solid ${G.border}`,padding:'24px 28px' }}>
            <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.gold,marginBottom:8 }}>Message Received</div>
            <div style={{ fontSize:13,color:G.silver }}>We'll be in touch shortly.</div>
          </div>
        ) : (
          <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
            {['Your Name','Email Address','Company / Business'].map(p=>(
              <input key={p} placeholder={p} style={inputStyle}
                onFocus={e=>e.target.style.borderColor=G.gold}
                onBlur={e=>e.target.style.borderColor=G.border} />
            ))}
            <textarea placeholder="Tell us about your project" rows={4} style={{...inputStyle,resize:'none'}}
              onFocus={e=>e.target.style.borderColor=G.gold}
              onBlur={e=>e.target.style.borderColor=G.border} />
            <button onClick={()=>setSent(true)} style={{ fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:G.black,background:G.gold,border:'none',padding:'13px 28px',cursor:'pointer',alignSelf:'flex-start',transition:'background 180ms' }}
              onMouseEnter={e=>e.currentTarget.style.background=G.goldLight}
              onMouseLeave={e=>e.currentTarget.style.background=G.gold}>
              Send Message
            </button>
          </div>
        )}
      </div>
    </section>
  );
}

/* ── FOOTER ── */
function Footer({ nav }) {
  return (
    <footer style={{ background:G.charcoal,borderTop:`1px solid ${G.border}`,padding:'48px 40px 28px' }}>
      <div style={{ maxWidth:1160,margin:'0 auto' }}>
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:48,marginBottom:40 }}>
          <div>
            <img src="../../assets/logo-lockup.png" alt="LBMD" style={{ height:60,width:'auto',marginBottom:16,opacity:0.9 }}/>
            <p style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontStyle:'italic',color:G.silver,lineHeight:1.5 }}>Authority-grade design.<br/>Built to command.</p>
          </div>
          <div>
            <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.35em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>Navigation</div>
            {['home','services','work','contact'].map(l=>(
              <div key={l} onClick={()=>nav(l)} style={{ fontFamily:"'Satoshi',sans-serif",fontSize:12,fontWeight:500,letterSpacing:'0.08em',color:G.silver,marginBottom:8,cursor:'pointer',transition:'color 180ms' }}
                onMouseEnter={e=>e.currentTarget.style.color=G.gold}
                onMouseLeave={e=>e.currentTarget.style.color=G.silver}>
                {l.charAt(0).toUpperCase()+l.slice(1)}
              </div>
            ))}
          </div>
          <div>
            <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.35em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>Connect</div>
            {['@myluckyblackmedia','myluckyblackmedia.com','hello@luckyblackmedia.com'].map(l=>(
              <div key={l} style={{ fontFamily:"'Satoshi',sans-serif",fontSize:11,color:G.mid,marginBottom:8,letterSpacing:'0.03em' }}>{l}</div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:`1px solid ${G.border}`,paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center' }}>
          <div style={{ fontFamily:"'Satoshi',sans-serif",fontSize:10,color:G.mid,letterSpacing:'0.1em' }}>© {new Date().getFullYear()} Lucky Black Media &amp; Design. All Rights Reserved.</div>
          <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.25em',textTransform:'uppercase',color:G.mid }}>Est. 2013 · Strategic Visuals</div>
        </div>
      </div>
    </footer>
  );
}

/* ── APP ── */
function App() {
  const [screen, setScreen] = React.useState(()=>localStorage.getItem('lbmd_mkt_screen')||'home');
  const nav = s => { setScreen(s); localStorage.setItem('lbmd_mkt_screen',s); window.scrollTo(0,0); };
  return (
    <div>
      <Nav screen={screen} nav={nav} />
      {screen==='home' && <>
        <Hero nav={nav} />
        <section style={{ background:G.charcoal,padding:'80px 40px',borderTop:`1px solid ${G.border}` }}>
          <div style={{ maxWidth:1160,margin:'0 auto' }}>
            <div style={{ textAlign:'center',marginBottom:52 }}>
              <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.45em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>Signature Services</div>
              <h2 style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,3.5vw,46px)',fontWeight:400,color:G.offWhite,lineHeight:1.1,marginBottom:12 }}>
                Strategic visuals built<br/><em style={{ color:G.gold }}>to position, not just decorate.</em>
              </h2>
              <div style={{ width:60,height:1,background:G.gold,margin:'16px auto 0' }}/>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:2 }}>
              {SERVICES.map(s=><ServiceCard key={s.num} {...s}/>)}
            </div>
          </div>
        </section>
      </>}
      {screen==='services' && (
        <section style={{ padding:'80px 40px',maxWidth:1160,margin:'0 auto' }}>
          <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.45em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>All Services</div>
          <h2 style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(32px,4vw,56px)',fontWeight:700,color:G.offWhite,lineHeight:1.0,marginBottom:40 }}>What We Do</h2>
          <div style={{ display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:2 }}>
            {SERVICES.map(s=><ServiceCard key={s.num} {...s}/>)}
          </div>
        </section>
      )}
      {screen==='work' && (
        <section style={{ padding:'80px 40px',maxWidth:1160,margin:'0 auto' }}>
          <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.45em',textTransform:'uppercase',color:G.gold,marginBottom:16 }}>Selected Work</div>
          <h2 style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(32px,4vw,56px)',fontWeight:700,color:G.offWhite,lineHeight:1.0,marginBottom:40 }}>Portfolio</h2>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:2 }}>
            {[['Apex Financial','Brand Identity','2024'],['Noir Studio','Web Design','2023'],['Vantage Group','Motion','2023'],['Crown & Co.','Brand Identity','2022']].map(([t,l,y],i)=>(
              <div key={t} style={{ background:G.charcoal,border:`1px solid rgba(184,150,46,0.06)`,padding:'36px 32px',cursor:'pointer',position:'relative',overflow:'hidden',transition:'border-color 180ms' }}
                onMouseEnter={e=>e.currentTarget.style.borderColor=G.border}
                onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(184,150,46,0.06)'}>
                <div style={{ position:'absolute',top:-10,right:8,fontFamily:"'Cormorant Garamond',serif",fontSize:80,fontWeight:700,color:'#161616',lineHeight:1,userSelect:'none' }}>0{i+1}</div>
                <div style={{ fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:G.gold,marginBottom:12 }}>{l}</div>
                <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,color:G.offWhite,marginBottom:16 }}>{t}</div>
                <div style={{ height:1,background:G.border,marginBottom:14 }}/>
                <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
                  <span style={{ fontFamily:"'Satoshi',sans-serif",fontSize:9,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:G.gold,border:`1px solid ${G.border}`,padding:'3px 10px',borderRadius:4 }}>{l}</span>
                  <span style={{ fontFamily:"'Satoshi',sans-serif",fontSize:9,color:G.mid }}>{y}</span>
                </div>
              </div>
            ))}
          </div>
        </section>
      )}
      {screen==='contact' && <Contact />}
      <Footer nav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
