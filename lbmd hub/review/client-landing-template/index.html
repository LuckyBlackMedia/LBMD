<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="">
<title></title>

<!-- Preconnect to font CDNs -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">

<!-- Instrument Serif (display) -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<!-- Satoshi (body) -->
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════════════════
   RESET
   ═══════════════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════════════════════════════════════════
   CUSTOM PROPERTIES
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  /* Accent — overridden at runtime by renderer.js from config */
  --accent-h: 32;
  --accent-s: 62%;

  /* Fonts */
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body:    'Satoshi', 'Helvetica Neue', sans-serif;

  /* Type scale */
  --text-xs:   clamp(.75rem,  .7rem  + .25vw, .875rem);
  --text-sm:   clamp(.875rem, .82rem + .3vw,  1rem);
  --text-base: clamp(1rem,    .95rem + .25vw, 1.125rem);
  --text-lg:   clamp(1.25rem, 1.1rem + .75vw, 1.75rem);
  --text-xl:   clamp(2rem,    1.5rem + 2.5vw, 3.5rem);
  --text-2xl:  clamp(2.5rem,  1.8rem + 3.5vw, 5rem);

  /* Spacing */
  --space-1:  .25rem;
  --space-2:  .5rem;
  --space-3:  .75rem;
  --space-4:  1rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-24: 6rem;

  /* Radii */
  --radius-sm:   .375rem;
  --radius-md:   .5rem;
  --radius-lg:   1rem;
  --radius-xl:   1.5rem;
  --radius-full: 9999px;

  /* Layout — overridable via CLIENT.layout */
  --section-pad: 6rem 4rem;
  --content-max: 1200px;

  /* Transitions */
  --t-fast: 150ms cubic-bezier(.16,1,.3,1);
  --t-base: 280ms cubic-bezier(.16,1,.3,1);
  --t-slow: 500ms cubic-bezier(.16,1,.3,1);

  /* Shadows */
  --shadow-sm: 0 2px 8px  rgba(0,0,0,.15);
  --shadow-md: 0 4px 16px rgba(0,0,0,.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.35);

  /* Z-layers */
  --z-nav:   100;
  --z-modal: 500;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DARK THEME  (default)
   ═══════════════════════════════════════════════════════════════════════════ */
[data-theme="dark"]{
  /* Accent lightness */
  --accent:        hsl(var(--accent-h),var(--accent-s),60%);
  --accent-light:  hsl(var(--accent-h),var(--accent-s),74%);
  --accent-pale:   hsl(var(--accent-h),calc(var(--accent-s) / 2),86%);
  --accent-dark:   hsl(var(--accent-h),var(--accent-s),42%);
  --accent-glow:   hsla(var(--accent-h),var(--accent-s),60%,.15);
  --accent-border: hsla(var(--accent-h),var(--accent-s),60%,.22);

  /* Surfaces */
  --bg:            #090909;
  --bg-alt:        #111111;
  --surface:       rgba(255,255,255,.03);
  --surface-solid: #161616;
  --surface-raised:#1E1E1E;

  /* Text */
  --text-primary:  #EFECE7;
  --text-secondary:#9A9794;
  --text-muted:    #575451;

  /* Border */
  --border: rgba(255,255,255,.08);

  color-scheme: dark;
}

/* ═══════════════════════════════════════════════════════════════════════════
   LIGHT THEME
   ═══════════════════════════════════════════════════════════════════════════ */
[data-theme="light"]{
  --accent:        hsl(var(--accent-h),var(--accent-s),38%);
  --accent-light:  hsl(var(--accent-h),var(--accent-s),52%);
  --accent-pale:   hsl(var(--accent-h),calc(var(--accent-s) / 2),76%);
  --accent-dark:   hsl(var(--accent-h),var(--accent-s),26%);
  --accent-glow:   hsla(var(--accent-h),var(--accent-s),38%,.1);
  --accent-border: hsla(var(--accent-h),var(--accent-s),38%,.2);

  --bg:            #FAFAF8;
  --bg-alt:        #F2F0EB;
  --surface:       rgba(0,0,0,.025);
  --surface-solid: #FFFFFF;
  --surface-raised:#F4F2ED;

  --text-primary:  #1A1918;
  --text-secondary:#5C5A56;
  --text-muted:    #9C9990;

  --border: rgba(0,0,0,.08);

  color-scheme: light;
}

/* ═══════════════════════════════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════════════════════════════ */
html{
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body{
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text-primary);
  background: var(--bg);
  overflow-x: hidden;
  line-height: 1.6;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;color:inherit;font:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}

/* ═══════════════════════════════════════════════════════════════════════════
   SKIP LINK
   ═══════════════════════════════════════════════════════════════════════════ */
.skip-link{
  position:absolute;
  top:-100%;
  left:var(--space-4);
  padding:var(--space-2) var(--space-6);
  background:var(--accent);
  color:var(--bg);
  font-family:var(--font-body);
  font-size:var(--text-sm);
  font-weight:700;
  letter-spacing:.05em;
  border-radius:0 0 var(--radius-md) var(--radius-md);
  z-index:9999;
  transition:top var(--t-fast);
}
.skip-link:focus{top:0}

/* ═══════════════════════════════════════════════════════════════════════════
   REVEAL ANIMATION
   ═══════════════════════════════════════════════════════════════════════════ */
.reveal{
  opacity:0;
  transform:translateY(28px);
  transition:opacity var(--t-slow),transform var(--t-slow);
}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal.delay-1{transition-delay:80ms}
.reveal.delay-2{transition-delay:160ms}
.reveal.delay-3{transition-delay:240ms}
.reveal.delay-4{transition-delay:320ms}
.reveal.delay-5{transition-delay:400ms}
.reveal.delay-6{transition-delay:480ms}

@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none}
  html{scroll-behavior:auto}
}

/* ═══════════════════════════════════════════════════════════════════════════
   SHARED TYPE + LAYOUT HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-2);
  font-size:var(--text-xs);
  font-weight:700;
  letter-spacing:.4em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:var(--space-4);
}
.section-headline{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  font-weight:400;
  color:var(--text-primary);
  line-height:1.12;
  margin-bottom:var(--space-4);
  white-space:pre-line;
}
.body-text{
  font-size:var(--text-base);
  color:var(--text-secondary);
  line-height:1.8;
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:var(--space-2);
  padding:var(--space-3) var(--space-6);
  font-family:var(--font-body);
  font-size:var(--text-xs);
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:var(--radius-full);
  cursor:pointer;
  transition:all var(--t-base);
  border:none;
  min-height:44px;
  min-width:44px;
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{
  background:var(--accent-light);
  transform:translateY(-2px);
  box-shadow:0 8px 24px hsla(var(--accent-h),var(--accent-s),60%,.35);
}
.btn-outline{
  background:transparent;
  color:var(--text-primary);
  border:1px solid var(--border);
}
.btn-outline:hover{
  border-color:var(--accent);
  color:var(--accent);
  transform:translateY(-2px);
}

/* ── SECTION DIVIDER ── */
.section-divider{
  height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
}

/* ═══════════════════════════════════════════════════════════════════════════
   NAVBAR
   ═══════════════════════════════════════════════════════════════════════════ */
.navbar{
  position:fixed;
  top:0;left:0;right:0;
  z-index:var(--z-nav);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 var(--space-8);
  height:72px;
  background:hsla(0,0%,4%,.88);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid var(--border);
  transition:background var(--t-base),box-shadow var(--t-base);
}
[data-theme="light"] .navbar{background:rgba(250,250,248,.92)}
.navbar.scrolled{box-shadow:0 4px 24px rgba(0,0,0,.18)}

.navbar-brand{
  font-family:var(--font-display);
  font-size:1.3rem;
  font-weight:400;
  color:var(--text-primary);
  letter-spacing:.04em;
  text-decoration:none;
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:var(--space-3);
}
.navbar-brand img{height:36px;width:auto}

.navbar-links{
  display:flex;
  align-items:center;
  gap:var(--space-6);
  list-style:none;
}
.navbar-links a{
  font-size:var(--text-xs);
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-secondary);
  text-decoration:none;
  transition:color var(--t-fast);
  min-height:44px;
  display:flex;
  align-items:center;
}
.navbar-links a:hover{color:var(--accent)}

.navbar-right{
  display:flex;
  align-items:center;
  gap:var(--space-3);
}

/* Theme toggle */
.theme-toggle{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:none;
  color:var(--text-secondary);
  cursor:pointer;
  transition:all var(--t-fast);
  flex-shrink:0;
}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

/* Hamburger (mobile) */
.nav-hamburger{
  display:none;
  flex-direction:column;
  justify-content:center;
  gap:5px;
  width:44px;height:44px;
  padding:var(--space-2);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:none;
  cursor:pointer;
}
.nav-hamburger span{
  display:block;
  height:1.5px;
  background:var(--text-primary);
  border-radius:2px;
  transition:transform var(--t-base),opacity var(--t-base),width var(--t-base);
  transform-origin:center;
}
.nav-hamburger[aria-expanded="true"] span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-hamburger[aria-expanded="true"] span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-hamburger[aria-expanded="true"] span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* Mobile drawer */
.nav-drawer{
  position:fixed;
  top:72px;left:0;right:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:var(--space-6) var(--space-6) var(--space-8);
  display:flex;
  flex-direction:column;
  gap:var(--space-2);
  transform:translateY(-110%);
  opacity:0;
  transition:transform var(--t-base),opacity var(--t-base);
  z-index:calc(var(--z-nav) - 1);
  pointer-events:none;
}
.nav-drawer.open{transform:translateY(0);opacity:1;pointer-events:auto}
.nav-drawer a{
  font-size:var(--text-sm);
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text-secondary);
  padding:var(--space-4) 0;
  border-bottom:1px solid var(--border);
  min-height:52px;
  display:flex;
  align-items:center;
  transition:color var(--t-fast);
}
.nav-drawer a:last-of-type{border-bottom:none}
.nav-drawer a:hover{color:var(--accent)}
.nav-drawer .btn{width:100%;margin-top:var(--space-2)}

@media(max-width:768px){
  .navbar{padding:0 var(--space-4)}
  .navbar-links,.navbar-right .btn,.navbar-right .theme-toggle{display:none}
  .nav-hamburger{display:flex}
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN — pad top to clear fixed navbar
   ═══════════════════════════════════════════════════════════════════════════ */
main{padding-top:72px}

/* ═══════════════════════════════════════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════════════════════════════════════ */
#hero{
  min-height:88vh;
  display:flex;
  align-items:center;
  position:relative;
  overflow:hidden;
}
.hero-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 70% 65% at 62% 38%,
      hsla(var(--accent-h),var(--accent-s),60%,.12) 0%,
      transparent 62%),
    radial-gradient(ellipse 40% 40% at 10% 80%,
      hsla(var(--accent-h),var(--accent-s),50%,.06) 0%,
      transparent 60%);
  pointer-events:none;
}
.hero-inner{
  position:relative;
  z-index:1;
  max-width:var(--content-max);
  margin:0 auto;
  padding:var(--section-pad);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--space-16);
  align-items:center;
  width:100%;
}
.hero-text{max-width:600px}
.hero-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-3);
  padding:var(--space-2) var(--space-4);
  background:var(--accent-glow);
  border:1px solid var(--accent-border);
  border-radius:var(--radius-full);
  font-size:var(--text-xs);
  font-weight:700;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:var(--space-6);
}
.hero-headline{
  font-family:var(--font-display);
  font-size:var(--text-2xl);
  font-weight:400;
  color:var(--text-primary);
  line-height:1.08;
  margin-bottom:var(--space-6);
  white-space:pre-line;
}
.hero-sub{
  font-size:var(--text-base);
  color:var(--text-secondary);
  line-height:1.8;
  margin-bottom:var(--space-8);
  max-width:50ch;
}
.hero-ctas{
  display:flex;
  align-items:center;
  gap:var(--space-4);
  flex-wrap:wrap;
}
.hero-visual{
  border-radius:var(--radius-xl);
  overflow:hidden;
  aspect-ratio:4/5;
  position:relative;
  box-shadow:var(--shadow-lg);
}
.hero-visual img{
  width:100%;height:100%;
  object-fit:cover;
}
.hero-visual-placeholder{
  width:100%;height:100%;
  background:
    radial-gradient(circle at 35% 40%,
      hsla(var(--accent-h),var(--accent-s),55%,.28) 0%,
      hsla(var(--accent-h),calc(var(--accent-s) / 2),30%,.14) 50%,
      transparent 75%),
    linear-gradient(155deg,var(--surface-raised) 0%,var(--bg-alt) 100%);
}

@media(max-width:900px){
  .hero-inner{
    grid-template-columns:1fr;
    padding:var(--space-16) var(--space-4) var(--space-24);
  }
  .hero-visual{display:none}
  .hero-headline{font-size:clamp(2rem,8vw,3.2rem)}
}

/* ═══════════════════════════════════════════════════════════════════════════
   SERVICES
   ═══════════════════════════════════════════════════════════════════════════ */
#services{background:var(--bg-alt)}
.services-inner{
  max-width:var(--content-max);
  margin:0 auto;
  padding:var(--section-pad);
}
.services-header{
  text-align:center;
  max-width:600px;
  margin:0 auto var(--space-16);
}
.services-header .section-headline{margin-bottom:0}
.services-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:var(--space-4);
}
.service-card{
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-8);
  transition:transform var(--t-base),box-shadow var(--t-base),border-color var(--t-base);
}
.service-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-md);
  border-color:var(--accent-border);
}
.service-icon{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);
  background:var(--accent-glow);
  color:var(--accent);
  margin-bottom:var(--space-6);
  flex-shrink:0;
}
.service-title{
  font-family:var(--font-display);
  font-size:1.25rem;
  font-weight:400;
  color:var(--text-primary);
  margin-bottom:var(--space-3);
}
.service-desc{
  font-size:var(--text-sm);
  color:var(--text-secondary);
  line-height:1.78;
}

@media(max-width:768px){.services-inner{padding:var(--space-16) var(--space-4)}}

/* ═══════════════════════════════════════════════════════════════════════════
   ABOUT
   ═══════════════════════════════════════════════════════════════════════════ */
#about{background:var(--bg)}
.about-inner{
  max-width:var(--content-max);
  margin:0 auto;
  padding:var(--section-pad);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--space-16);
  align-items:start;
}
.about-visual{
  border-radius:var(--radius-xl);
  overflow:hidden;
  aspect-ratio:3/4;
  position:relative;
  box-shadow:var(--shadow-lg);
}
.about-visual img{width:100%;height:100%;object-fit:cover}
.about-visual-placeholder{
  width:100%;height:100%;
  background:linear-gradient(
    152deg,
    hsla(var(--accent-h),var(--accent-s),50%,.22) 0%,
    var(--bg-alt) 100%
  );
}
.about-text{
  display:flex;
  flex-direction:column;
  gap:var(--space-6);
  padding-top:var(--space-4);
}
.about-body{
  font-size:var(--text-base);
  color:var(--text-secondary);
  line-height:1.82;
}
.about-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--space-3);
  margin-top:var(--space-2);
}
.about-stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-6);
  transition:border-color var(--t-fast);
}
.about-stat:hover{border-color:var(--accent-border)}
.about-stat-value{
  font-family:var(--font-display);
  font-size:2.6rem;
  font-weight:400;
  color:var(--accent);
  line-height:1;
  margin-bottom:var(--space-2);
}
.about-stat-label{
  font-size:var(--text-xs);
  font-weight:700;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--text-muted);
}

@media(max-width:700px){
  .about-inner{
    grid-template-columns:1fr;
    padding:var(--space-16) var(--space-4);
  }
  .about-visual{aspect-ratio:4/3}
}

/* ═══════════════════════════════════════════════════════════════════════════
   WORK / PORTFOLIO
   ═══════════════════════════════════════════════════════════════════════════ */
#work{background:var(--bg-alt)}
.work-inner{
  max-width:var(--content-max);
  margin:0 auto;
  padding:var(--section-pad);
}
.work-header{margin-bottom:var(--space-12)}
.work-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:var(--space-4);
}
.work-card{
  border-radius:var(--radius-lg);
  overflow:hidden;
  position:relative;
  aspect-ratio:4/3;
  background:var(--surface-solid);
  cursor:pointer;
  display:block;
  text-decoration:none;
}
.work-card-image{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform 640ms cubic-bezier(.16,1,.3,1);
}
.work-card:hover .work-card-image{transform:scale(1.06)}
.work-card-thumb{
  position:absolute;
  inset:0;
  transition:transform 640ms cubic-bezier(.16,1,.3,1);
}
.work-card:hover .work-card-thumb{transform:scale(1.06)}
.work-card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.78) 0%,

    for (var i = 0; i < items.length; i++) {
      var item  = items[i];
      var delay = (i % 6) + 1;
      cardsHTML +=
        '<div class="service-card reveal delay-' + delay + '">' +
          '<div class="service-icon"><i data-lucide="' + esc(item.icon) + '"></i></div>' +
          '<div class="service-title">' + esc(item.title) + '</div>' +
          '<div class="service-desc">'  + esc(item.desc)  + '</div>' +
        '</div>';
    }
    el.innerHTML =
      '<div class="services-inner">' +
        '<div class="services-header reveal">' +
          '<div class="eyebrow">'          + esc(CLIENT.services.eyebrow)  + '</div>' +
          '<h2 class="section-headline">'  + esc(CLIENT.services.headline) + '</h2>' +
        '</div>' +
        '<div class="services-grid">' + cardsHTML + '</div>' +
      '</div>';
    setupReveal(el);
  }());

  // ── ABOUT ────────────────────────────────────────────────────────────────────
  (function() {
    var el = document.getElementById('about');
    if (!el) return;
    var a = CLIENT.about;
    var visualContent = a.imageSrc
      ? '<img src="' + esc(a.imageSrc) + '" alt="' + esc(a.imageAlt) + '" loading="lazy">'
      : '<div class="about-visual-placeholder" role="img" aria-label="' + esc(a.imageAlt) + '"></div>';
    var statsHTML = '';
    if (a.stats && a.stats.length) {
      for (var i = 0; i < a.stats.length; i++) {
        statsHTML +=
          '<div class="about-stat">' +
            '<div class="about-stat-value">' + esc(a.stats[i].value) + '</div>' +
            '<div class="about-stat-label">' + esc(a.stats[i].label) + '</div>' +
          '</div>';
      }
    }
    el.innerHTML =
      '<div class="about-inner">' +
        '<div class="about-visual reveal">' + visualContent + '</div>' +
        '<div class="about-text">' +
          '<div class="eyebrow reveal">'                        + esc(a.eyebrow)  + '</div>' +
          '<h2 class="section-headline reveal delay-1">'        + esc(a.headline) + '</h2>' +
          '<p class="about-body reveal delay-2">'               + esc(a.body)     + '</p>' +
          '<div class="about-stats reveal delay-3">' + statsHTML + '</div>' +
        '</div>' +
      '</div>';
    setupReveal(el);
  }());

  // ── WORK ─────────────────────────────────────────────────────────────────────
  (function() {
    var el    = document.getElementById('work');
    if (!el) return;
    var data  = CLIENT.work;
    var items = data.items || [];
    var cardsHtml = '';
    for (var i = 0; i < items.length; i++) {
      var item  = items[i];
      var delay = (i % 6) + 1;
      var href  = item.href ? esc(item.href) : '#';
      var thumbHtml;
      if (item.imageSrc) {
        thumbHtml = '<img class="work-card-image" src="' + esc(item.imageSrc) + '" alt="' + esc(item.imageAlt) + '" loading="lazy">';
      } else {
        var safeHex = /^#[0-9a-fA-F]{3,6}$/.test(item.hex) ? item.hex : '#888';
        thumbHtml = '<div class="work-card-thumb" style="background-color:' + safeHex + '" role="img" aria-label="' + esc(item.imageAlt) + '"></div>';
      }
      cardsHtml +=
        '<a class="work-card reveal delay-' + delay + '" href="' + href + '">' +
          thumbHtml +
          '<div class="work-card-overlay">' +
            '<div class="work-card-cat">'   + esc(item.category) + '</div>' +
            '<div class="work-card-title">' + esc(item.title)    + '</div>' +
            '<div class="work-card-year">'  + esc(item.year)     + '</div>' +
          '</div>' +
        '</a>';
    }
    el.innerHTML =
      '<div class="work-inner">' +
        '<div class="work-header reveal">' +
          '<div class="eyebrow">'         + esc(data.eyebrow)  + '</div>' +
          '<h2 class="section-headline">' + esc(data.headline) + '</h2>' +
        '</div>' +
        '<div class="work-grid">' + cardsHtml + '</div>' +
      '</div>';
    setupReveal(el);
  }());

  // ── TESTIMONIALS ─────────────────────────────────────────────────────────────
  (function() {
    var el    = document.getElementById('testimonials');
    if (!el) return;
    var data  = CLIENT.testimonials;
    var items = data.items || [];
    function initials(name) {
      var parts = String(name).trim().split(/\s+/);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }
    var cardsHtml = '';
    for (var i = 0; i < items.length; i++) {
      var item  = items[i];
      var delay = (i % 6) + 1;
      cardsHtml +=
        '<div class="testimonial-card reveal delay-' + delay + '">' +
          '<div class="testimonial-mark" aria-hidden="true">&ldquo;</div>' +
          '<p class="testimonial-body">' + esc(item.quote) + '</p>' +
          '<div class="testimonial-footer">' +
            '<div class="testimonial-avatar" aria-hidden="true">' + esc(initials(item.name)) + '</div>' +
            '<div>' +
              '<div class="testimonial-name">' + esc(item.name)  + '</div>' +
              '<div class="testimonial-role">' + esc(item.title) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }
    el.innerHTML =
      '<div class="testimonials-inner">' +
        '<div class="testimonials-header reveal">' +
          '<div class="eyebrow">'         + esc(data.eyebrow)  + '</div>' +
          '<h2 class="section-headline">' + esc(data.headline) + '</h2>' +
        '</div>' +
        '<div class="testimonials-grid">' + cardsHtml + '</div>' +
      '</div>';
    setupReveal(el);
  }());

  // ── CONTACT ──────────────────────────────────────────────────────────────────
  (function() {
    var el = document.getElementById('contact');
    if (!el) return;
    var c = CLIENT.contact;
    var detailsHtml = '';
    if (c.email) {
      detailsHtml +=
        '<div class="contact-detail">' +
          '<div class="contact-detail-icon"><i data-lucide="mail"></i></div>' +
          '<div><div class="contact-detail-label">Email</div>' +
          '<a href="mailto:' + esc(c.email) + '" class="contact-detail-value">' + esc(c.email) + '</a></div>' +
        '</div>';
    }
    if (c.phone) {
      detailsHtml +=
        '<div class="contact-detail">' +
          '<div class="contact-detail-icon"><i data-lucide="phone"></i></div>' +
          '<div><div class="contact-detail-label">Phone</div>' +
          '<a href="tel:' + esc(c.phone) + '" class="contact-detail-value">' + esc(c.phone) + '</a></div>' +
        '</div>';
    }
    if (c.address) {
      detailsHtml +=
        '<div class="contact-detail">' +
          '<div class="contact-detail-icon"><i data-lucide="map-pin"></i></div>' +
          '<div><div class="contact-detail-label">Location</div>' +
          '<span class="contact-detail-value">' + esc(c.address) + '</span></div>' +
        '</div>';
    }
    el.innerHTML =
      '<div class="contact-inner">' +
        '<div class="contact-lhs">' +
          '<div class="eyebrow reveal">'                  + esc(c.eyebrow)  + '</div>' +
          '<h2 class="section-headline reveal delay-1">'  + esc(c.headline) + '</h2>' +
          '<p class="body-text reveal delay-2">'          + esc(c.subtext)  + '</p>' +
          '<div class="contact-details reveal delay-3">'  + detailsHtml     + '</div>' +
        '</div>' +
        '<div class="contact-form-wrap reveal delay-2">' +
          '<form id="contact-form" novalidate>' +
            '<div style="display:flex;flex-direction:column;gap:1.5rem;">' +
              '<div class="form-row">' +
                '<div class="form-group">' +
                  '<label class="form-label" for="cf-first">First Name</label>' +
                  '<input class="form-input" id="cf-first" name="first_name" type="text" placeholder="First" required autocomplete="given-name">' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label" for="cf-last">Last Name</label>' +
                  '<input class="form-input" id="cf-last" name="last_name" type="text" placeholder="Last" required autocomplete="family-name">' +
                '</div>' +
              '</div>' +
              '<div class="form-group">' +
                '<label class="form-label" for="cf-email">Email</label>' +
                '<input class="form-input" id="cf-email" name="email" type="email" placeholder="you@example.com" required autocomplete="email">' +
              '</div>' +
              '<div class="form-group">' +
                '<label class="form-label" for="cf-message">Message</label>' +
                '<textarea class="form-textarea" id="cf-message" name="message" placeholder="Tell us about your project..." required></textarea>' +
              '</div>' +
              '<button type="submit" class="form-submit">Send Message</button>' +
              '<div class="form-status" id="form-status" aria-live="polite"></div>' +
            '</div>' +
          '</form>' +
        '</div>' +
      '</div>';
    var form     = el.querySelector('#contact-form');
    var statusEl = el.querySelector('#form-status');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = form.querySelector('.form-submit');
      btn.disabled = true; btn.textContent = 'Sending\u2026';
      statusEl.className = 'form-status'; statusEl.textContent = '';
      if (c.formspreeId) {
        fetch('https://formspree.io/f/' + c.formspreeId, {
          method: 'POST', headers: { 'Accept': 'application/json' }, body: new FormData(form)
        })
        .then(function(r) {
          if (r.ok) {
            statusEl.className = 'form-status ok';
            statusEl.textContent = 'Message sent \u2014 we\u2019ll be in touch soon.';
            form.reset();
          } else { throw new Error('server'); }
        })
        .catch(function() {
          statusEl.className = 'form-status err';
          statusEl.textContent = 'Something went wrong. Please email us directly.';
        })
        .finally(function() { btn.disabled = false; btn.textContent = 'Send Message'; });
      } else {
        var first   = form.querySelector('#cf-first').value;
        var last    = form.querySelector('#cf-last').value;
        var email   = form.querySelector('#cf-email').value;
        var message = form.querySelector('#cf-message').value;
        var subject = encodeURIComponent('Enquiry from ' + first + ' ' + last);
        var body    = encodeURIComponent(message + '\n\nFrom: ' + email);
        window.location.href = 'mailto:' + c.email + '?subject=' + subject + '&body=' + body;
        btn.disabled = false; btn.textContent = 'Send Message';
      }
    });
    setupReveal(el);
  }());

  // ── FOOTER ───────────────────────────────────────────────────────────────────
  (function() {
    var el     = document.getElementById('footer');
    if (!el) return;
    var b      = CLIENT.brand;
    var f      = CLIENT.footer;
    var social = CLIENT.social || [];
    var footerLinksHtml = '';
    for (var i = 0; i < f.links.length; i++) {
      footerLinksHtml += '<li><a href="' + esc(f.links[i].href) + '">' + esc(f.links[i].label) + '</a></li>';
    }
    var socialHtml = '';
    for (var j = 0; j < social.length; j++) {
      var s = social[j];
      socialHtml +=
        '<a href="' + esc(s.href) + '" aria-label="' + esc(s.platform) + '" target="_blank" rel="noopener noreferrer">' +
          '<i data-lucide="' + esc(s.icon) + '"></i>' +
        '</a>';
    }
    el.innerHTML =
      '<div class="footer-inner">' +
        '<div class="footer-top">' +
          '<div class="footer-brand">' +
            '<div class="footer-brand-name">' + esc(b.name)    + '</div>' +
            '<div class="footer-tagline">'    + esc(f.tagline) + '</div>' +
          '</div>' +
          '<div class="footer-mid">' +
            '<ul class="footer-links" role="list">' + footerLinksHtml + '</ul>' +
            '<div class="footer-social">' + socialHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="footer-bottom">' +
          '<div class="footer-copy">&copy; ' + String(f.year) + ' ' + esc(b.name) + '. All rights reserved.</div>' +
          '<div class="footer-credit"><a href="' + esc(f.creditHref) + '" target="_blank" rel="noopener noreferrer">' + esc(f.credit) + '</a></div>' +
        '</div>' +
      '</div>';
  }());

  // ── REVEAL + LUCIDE INIT ─────────────────────────────────────────────────
  // Runs before DOMContentLoaded (deferred scripts execute first per spec).
  document.addEventListener('DOMContentLoaded', function () {
    // Initialise Lucide icons exactly once, after all section HTML is injected.
    if (window.lucide) lucide.createIcons();
    // Wire up any .reveal elements added by section stubs.
    setupReveal();
  });

})();
</script>

</body>
</html>
