name = "lbmd-portal-api"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Account ID
account_id = "7b69eaaaea3389e222f85ef951327c45"

# Routes — serves portal.myluckyblackmedia.com
routes = [
  { pattern = "portal.myluckyblackmedia.com/*", zone_name = "myluckyblackmedia.com" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "lbmd-portal-db"
database_id = "3f49abe8-644f-4df0-a79a-ba4acf7402ea"

# KV Namespace binding (sessions)
[[kv_namespaces]]
binding = "SESSIONS"
id = "006815380b47486c8c47928265161ae2"

# R2 — BlackSuite media (deliveries, proofs, invoices)
[[r2_buckets]]
binding     = "MEDIA"
bucket_name = "lbm-blacksuite-media"

# ── Secrets (set via wrangler secret put) ────────────────────────────────────
# B2 overflow — optional; provision when R2 free tier (10 GB) is exceeded
# wrangler secret put B2_ENDPOINT      # e.g. https://s3.us-west-004.backblazeb2.com
# wrangler secret put B2_ACCESS_KEY    # B2 application key ID
# wrangler secret put B2_SECRET_KEY    # B2 application key
# wrangler secret put B2_BUCKET        # bucket name
# wrangler secret put B2_REGION        # e.g. us-west-004 (default if omitted)
#
# NAS archive tier — optional; for backup/archive, not client-facing delivery
# Enable S3-compatible API on your NAS (Synology/TrueNAS Minio/QNAP HBS) first
# wrangler secret put NAS_ENDPOINT     # e.g. https://nas.yourdomain.com:9000
# wrangler secret put NAS_ACCESS_KEY
# wrangler secret put NAS_SECRET_KEY
# wrangler secret put NAS_BUCKET
# wrangler secret put NAS_REGION       # default: us-east-1
